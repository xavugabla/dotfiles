# Global runtime/tooling managed by mise on Linux workstations.
# Keep this limited to Node and Node-based CLIs; Python stays on pyenv.
[tools]
node = "24.12.0"
npm = "11.12.1"
"npm:@github/copilot" = "0.0.377"
"npm:@openai/codex" = "0.121.0"

[settings]
idiomatic_version_file_enable_tools = ["node"]
node.corepack = true
