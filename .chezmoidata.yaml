contexts:
  daisychain:
    repo_root: code/daisychain
    gitconfig_path: ~/.gitconfig-daisychain
    gcloud_config: daisychain
  other_projects:
    repo_root: code/personal
    gitconfig_path: ~/.gitconfig-other-projects
  proxima:
    repo_root: code/proxima
    gitconfig_path: ~/.gitconfig-proxima
    gcloud_config: proxima

security:
  chezmoi_age_key_file: ~/.config/chezmoi/key.txt.age
  require_1password_for_chezmoi_age: true

profiles:
  meta_mac:
    machine_role: meta
    onepassword_ssh_agent: true
    selector:
      os: darwin
      usernames:
        - fxbc
      hostnames: []
    enabled_contexts:
      - daisychain
      - other_projects
      - proxima
  DC_OS:
    machine_role: daisychain
    onepassword_ssh_agent: true
    selector:
      os: darwin
      usernames:
        - DC
      hostnames: []
    enabled_contexts:
      - daisychain
  XA_OS:
    machine_role: other_projects
    onepassword_ssh_agent: true
    selector:
      os: darwin
      usernames:
        - XA
      hostnames: []
    enabled_contexts:
      - other_projects
      - proxima
  fx_linux:
    machine_role: linux_execution
    onepassword_ssh_agent: false
    selector:
      os: linux
      usernames:
        - xavier
      hostnames:
        - fx
    enabled_contexts:
      - daisychain
      - other_projects
      - proxima
